<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="可爱风格的用户登录页面" />
  <title>欢迎登录 ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <!-- 左侧：动画小人区域 -->
    <div class="left-panel">
      <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
      </div>

      <div class="characters-scene">
        <!-- 小人1：挥手的小可爱 -->
        <div class="character char-1" id="char1">
          <svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
            <!-- 身体 -->
            <ellipse cx="60" cy="120" rx="28" ry="32" fill="#5B9CF5" />
            <!-- 头 -->
            <circle cx="60" cy="58" r="30" fill="#FFE0B2" />
            <!-- 腮红 -->
            <circle cx="42" cy="65" r="6" fill="#FFAB91" opacity="0.6" />
            <circle cx="78" cy="65" r="6" fill="#FFAB91" opacity="0.6" />
            <!-- 眼睛 -->
            <circle cx="50" cy="55" r="4" fill="#333" />
            <circle cx="70" cy="55" r="4" fill="#333" />
            <circle cx="51.5" cy="53.5" r="1.5" fill="#fff" />
            <circle cx="71.5" cy="53.5" r="1.5" fill="#fff" />
            <!-- 嘴巴 -->
            <path d="M52 70 Q60 78 68 70" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round" />
            <!-- 挥动的手 -->
            <g class="waving-hand">
              <ellipse cx="98" cy="85" rx="8" ry="6" fill="#FFE0B2" />
              <line x1="90" y1="88" x2="78" y2="100" stroke="#FFE0B2" stroke-width="8" stroke-linecap="round" />
            </g>
            <!-- 左手 -->
            <ellipse cx="32" cy="110" rx="7" ry="5" fill="#FFE0B2" />
            <!-- 脚 -->
            <ellipse cx="48" cy="148" rx="10" ry="5" fill="#3A7BD5" />
            <ellipse cx="72" cy="148" rx="10" ry="5" fill="#3A7BD5" />
            <!-- 头发 -->
            <path d="M30 50 Q35 20 60 25 Q85 20 90 50" fill="#8D6E63" />
            <circle cx="38" cy="40" r="5" fill="#8D6E63" />
            <circle cx="82" cy="40" r="5" fill="#8D6E63" />
          </svg>
        </div>

        <!-- 小人2：跳跃的小可爱 -->
        <div class="character char-2" id="char2">
          <svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
            <!-- 身体 -->
            <ellipse cx="60" cy="120" rx="26" ry="30" fill="#3D8BF8" />
            <!-- 头 -->
            <circle cx="60" cy="58" r="28" fill="#FFE0B2" />
            <!-- 腮红 -->
            <circle cx="44" cy="64" r="5" fill="#FFAB91" opacity="0.6" />
            <circle cx="76" cy="64" r="5" fill="#FFAB91" opacity="0.6" />
            <!-- 眼睛 - 开心眯眯眼 -->
            <path d="M46 56 Q50 50 54 56" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round" />
            <path d="M66 56 Q70 50 74 56" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round" />
            <!-- 嘴巴 - 大笑 -->
            <path d="M48 68 Q60 80 72 68" stroke="#333" stroke-width="2" fill="#FF8A80" stroke-linecap="round" />
            <!-- 双手举起 -->
            <line x1="34" y1="100" x2="20" y2="78" stroke="#FFE0B2" stroke-width="8" stroke-linecap="round" />
            <line x1="86" y1="100" x2="100" y2="78" stroke="#FFE0B2" stroke-width="8" stroke-linecap="round" />
            <ellipse cx="18" cy="74" rx="6" ry="5" fill="#FFE0B2" />
            <ellipse cx="102" cy="74" rx="6" ry="5" fill="#FFE0B2" />
            <!-- 脚 -->
            <ellipse cx="48" cy="148" rx="9" ry="5" fill="#2E6FD1" />
            <ellipse cx="72" cy="148" rx="9" ry="5" fill="#2E6FD1" />
            <!-- 帽子 -->
            <ellipse cx="60" cy="34" rx="30" ry="6" fill="#7EB8FF" />
            <path d="M40 34 Q42 10 60 8 Q78 10 80 34" fill="#7EB8FF" />
            <circle cx="60" cy="6" r="5" fill="#3A7BD5" />
          </svg>
        </div>

        <!-- 小人3：害羞的小可爱 -->
        <div class="character char-3" id="char3">
          <svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
            <!-- 身体 -->
            <ellipse cx="60" cy="120" rx="25" ry="28" fill="#56CCF2" />
            <!-- 头 -->
            <circle cx="60" cy="58" r="26" fill="#FFE0B2" />
            <!-- 腮红 - 更红 -->
            <circle cx="43" cy="64" r="7" fill="#FF8A80" opacity="0.5" />
            <circle cx="77" cy="64" r="7" fill="#FF8A80" opacity="0.5" />
            <!-- 眼睛 - 大眼睛 -->
            <ellipse cx="50" cy="55" rx="5" ry="6" fill="#333" />
            <ellipse cx="70" cy="55" rx="5" ry="6" fill="#333" />
            <circle cx="52" cy="53" r="2" fill="#fff" />
            <circle cx="72" cy="53" r="2" fill="#fff" />
            <!-- 嘴巴 - 害羞小嘴 -->
            <circle cx="60" cy="71" r="3" fill="#FF8A80" />
            <!-- 双手合在前面 -->
            <ellipse cx="60" cy="112" rx="10" ry="6" fill="#FFE0B2" />
            <!-- 脚 -->
            <ellipse cx="48" cy="145" rx="9" ry="5" fill="#3A9BE0" />
            <ellipse cx="72" cy="145" rx="9" ry="5" fill="#3A9BE0" />
            <!-- 蝴蝶结 -->
            <path d="M48 36 L60 42 L72 36 L60 30 Z" fill="#5B9CF5" />
            <circle cx="60" cy="36" r="4" fill="#3A7BD5" />
            <!-- 头发 -->
            <path d="M34 55 Q30 30 50 28" stroke="#5D4037" stroke-width="5" fill="none" stroke-linecap="round" />
            <path d="M86 55 Q90 30 70 28" stroke="#5D4037" stroke-width="5" fill="none" stroke-linecap="round" />
          </svg>
        </div>

        <!-- 小人4：跑步的小可爱 -->
        <div class="character char-4" id="char4">
          <svg viewBox="0 0 130 160" xmlns="http://www.w3.org/2000/svg">
            <!-- 身体 -->
            <ellipse cx="65" cy="115" rx="24" ry="28" fill="#6CB4EE" />
            <!-- 头 -->
            <circle cx="65" cy="55" r="27" fill="#FFE0B2" />
            <!-- 腮红 -->
            <circle cx="48" cy="62" r="5" fill="#FFAB91" opacity="0.5" />
            <circle cx="82" cy="62" r="5" fill="#FFAB91" opacity="0.5" />
            <!-- 眼睛 - 调皮 -->
            <circle cx="55" cy="52" r="4" fill="#333" />
            <circle cx="75" cy="52" r="4" fill="#333" />
            <circle cx="56.5" cy="50.5" r="1.5" fill="#fff" />
            <circle cx="76.5" cy="50.5" r="1.5" fill="#fff" />
            <!-- 舌头 -->
            <path d="M57 66 Q65 76 73 66" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round" />
            <ellipse cx="65" cy="72" rx="4" ry="3" fill="#FF8A80" />
            <!-- 手臂 - 跑步姿势 -->
            <line x1="41" y1="100" x2="25" y2="90" stroke="#FFE0B2" stroke-width="7" stroke-linecap="round" class="run-arm-left" />
            <line x1="89" y1="100" x2="105" y2="115" stroke="#FFE0B2" stroke-width="7" stroke-linecap="round" class="run-arm-right" />
            <!-- 脚 - 跑步 -->
            <ellipse cx="45" cy="143" rx="10" ry="5" fill="#4A94D8" class="run-foot-left" />
            <ellipse cx="80" cy="140" rx="10" ry="5" fill="#4A94D8" class="run-foot-right" />
            <!-- 围巾 -->
            <path d="M42 75 Q65 82 88 75 Q90 85 85 90" stroke="#7EB8FF" stroke-width="4" fill="none" stroke-linecap="round" />
            <line x1="85" y1="85" x2="95" y2="105" stroke="#7EB8FF" stroke-width="4" stroke-linecap="round" class="scarf-tail" />
          </svg>
        </div>
      </div>

      <!-- 地面 -->
      <div class="ground">
        <div class="grass"></div>
      </div>

      <!-- 装饰元素 -->
      <div class="decorations">
        <div class="star star-1">✦</div>
        <div class="star star-2">★</div>
        <div class="star star-3">✧</div>
        <div class="star star-4">✦</div>
        <div class="star star-5">♡</div>
        <div class="star star-6">✦</div>
        <div class="cloud cloud-1">☁</div>
        <div class="cloud cloud-2">☁</div>
      </div>

      <h2 class="welcome-text">欢迎回来！ 🎉</h2>
    </div>

    <!-- 右侧：登录表单区域 -->
    <div class="right-panel">
      <div class="login-card">
        <div class="login-header">
          <div class="avatar-icon">
            <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
              <circle cx="30" cy="30" r="28" fill="url(#avatarGrad)" />
              <circle cx="30" cy="24" r="10" fill="#fff" />
              <path d="M14 48 Q14 36 30 36 Q46 36 46 48" fill="#fff" />
              <defs>
                <linearGradient id="avatarGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#5B9CF5" />
                  <stop offset="100%" stop-color="#56CCF2" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1>用户登录</h1>
          <p class="subtitle">请输入您的账号信息 ✨</p>
        </div>

        <form id="loginForm" onsubmit="return handleLogin(event)">
          <div class="input-group" id="usernameGroup">
            <label for="username">用户名</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </span>
              <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required />
            </div>
          </div>

          <div class="input-group" id="passwordGroup">
            <label for="password">密码</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
              </span>
              <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required />
              <button type="button" class="toggle-password" id="togglePassword" onclick="togglePasswordVisibility()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eyeIcon">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="form-options">
            <label class="checkbox-wrapper">
              <input type="checkbox" id="rememberMe" />
              <span class="checkmark"></span>
              <span>记住我</span>
            </label>
            <a href="#" class="forgot-link">忘记密码？</a>
          </div>

          <button type="submit" class="login-btn" id="loginBtn">
            <span class="btn-text">登 录</span>
            <span class="btn-loader" id="btnLoader"></span>
          </button>
        </form>

        <div class="divider">
          <span>或使用以下方式登录</span>
        </div>

        <div class="social-login">
          <button class="social-btn" id="wechatLogin" title="微信登录">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.328.328 0 0 0 .186-.065l1.793-1.024a.594.594 0 0 1 .456-.07 10.15 10.15 0 0 0 3.189.51c.263 0 .52-.022.776-.04-.168-.56-.258-1.145-.258-1.748 0-3.68 3.461-6.67 7.726-6.67.266 0 .527.013.786.037C17.144 4.678 13.26 2.188 8.691 2.188zm-2.6 4.408c.58 0 1.05.47 1.05 1.05s-.47 1.05-1.05 1.05-1.05-.47-1.05-1.05.47-1.05 1.05-1.05zm5.2 0c.58 0 1.05.47 1.05 1.05s-.47 1.05-1.05 1.05-1.05-.47-1.05-1.05.47-1.05 1.05-1.05zm4.544 3.09c-3.837 0-6.95 2.708-6.95 6.048 0 3.342 3.113 6.05 6.95 6.05.778 0 1.526-.115 2.225-.32a.49.49 0 0 1 .378.057l1.255.717a.27.27 0 0 0 .153.053.242.242 0 0 0 .24-.243c0-.06-.023-.118-.038-.176l-.273-1.034a.488.488 0 0 1 .176-.55C21.072 18.932 22 17.24 22 15.335c0-3.34-3.114-6.05-6.95-6.05h-.215zm-2.746 3.14c.483 0 .875.39.875.874s-.392.875-.875.875-.875-.392-.875-.875.392-.875.875-.875zm4.563 0c.483 0 .875.39.875.874s-.392.875-.875.875-.875-.392-.875-.875.392-.875.875-.875z"/>
            </svg>
          </button>
          <button class="social-btn" id="qqLogin" title="QQ登录">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 0 0-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
            </svg>
          </button>
          <button class="social-btn" id="githubLogin" title="GitHub登录">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/>
            </svg>
          </button>
        </div>

        <p class="register-text">
          还没有账号？<a href="#" class="register-link">立即注册</a>
        </p>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
