<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataMerge - 智训</title>
    <link rel="stylesheet" href="/static/css/training.css?v=20260326a">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <nav class="nav-links">
                    <a href="/dashboard">首页</a>
                    <a href="/rules">规则</a>
                    <a href="/training" class="active">智训</a>
                    <a href="/compute">智算</a>
                    <a href="/admin" id="nav-admin" style="display:none;">管理</a>
                </nav>
            </div>
            <div class="user-info" id="user-info"></div>
        </header>

        <div class="main-content">
            <!-- 左侧: 租户选择 + 会话列表 -->
            <section class="session-sidebar">
                <div class="sidebar-header">
                    <h2>训练会话</h2>
                    <button class="btn-new-session" id="btn-new-session" onclick="createNewSession()">+ 新建</button>
                </div>
                <!-- 租户选择 -->
                <div class="tenant-selector">
                    <div class="combo-box" id="tenant-combo">
                        <input type="text" id="tenant-input"
                               placeholder="选择租户..."
                               autocomplete="off">
                        <div class="combo-dropdown" id="tenant-dropdown"></div>
                    </div>
                </div>
                <!-- 会话列表 -->
                <div class="session-list" id="session-list">
                    <div class="session-list-empty" id="session-list-empty">选择租户后显示训练历史</div>
                </div>
            </section>

            <!-- 右侧: AI 对话区 -->
            <div class="chat-panel">
                <div class="chat-header">
                    <div class="chat-header-left">
                        <h2 id="chat-title">智能训练</h2>
                        <span class="chat-status" id="chat-status"></span>
                    </div>
                    <div class="chat-actions" id="chat-actions">
                        <button class="btn btn-action" id="btn-set-best" onclick="setBestCode()" style="display:none;" title="将当前代码设为最佳脚本">设为最佳</button>
                        <button class="btn btn-action" id="btn-upload-code" onclick="showUploadCode()" style="display:none;" title="直接上传代码文件">上传代码</button>
                        <button class="btn btn-action" id="btn-download-code" onclick="downloadCode()" style="display:none;" title="下载当前最佳代码">下载代码</button>
                    </div>
                </div>

                <div class="chat-messages" id="chat-messages">
                    <div class="chat-placeholder" id="chat-placeholder">
                        <div class="placeholder-content">
                            <div class="placeholder-icon">&#x1F9E0;</div>
                            <p class="placeholder-title">智能训练对话</p>
                            <p class="placeholder-hint">选择租户 → 新建或选择训练会话 → 上传文件开始训练</p>
                        </div>
                    </div>
                </div>

                <div class="chat-input-area" id="chat-input-area">
                    <button class="btn-attach" id="attach-btn" onclick="toggleAttachPopover()" title="文件与配置">&#x1F4CE;</button>
                    <textarea id="chat-input" placeholder="分析讨论或描述修改方案..." rows="2" onkeydown="handleInputKeydown(event)"></textarea>
                    <button id="send-btn" class="btn btn-send" onclick="sendMessage()" title="发送对话（分析/讨论）">发送</button>
                    <button id="generate-btn" class="btn btn-generate" onclick="sendMessage('generate')" title="根据讨论结果修正代码并执行验证">执行修正</button>
                </div>

                <!-- 文件与配置 - 居中模态弹窗 -->
                <div class="modal-overlay" id="attach-popover" style="display:none;" onclick="if(event.target===this)toggleAttachPopover()">
                    <div class="modal-dialog">
                        <div class="modal-header">
                            <span>文件与配置</span>
                            <button class="modal-close" onclick="toggleAttachPopover()">&times;</button>
                        </div>
                        <div class="modal-body">
                            <div class="form-row">
                                <div class="form-group">
                                    <label>源文件:</label>
                                    <input type="file" id="source-files" multiple accept=".xlsx,.xls">
                                    <div class="file-list" id="source-file-list"></div>
                                </div>
                                <div class="form-group">
                                    <label>目标文件:</label>
                                    <input type="file" id="target-file" accept=".xlsx,.xls">
                                    <div class="file-list" id="target-file-list"></div>
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>规则文件 (可选):</label>
                                    <input type="file" id="rule-files" multiple accept=".md,.txt,.pdf,.docx">
                                    <div class="file-list" id="rule-file-list"></div>
                                </div>
                                <div class="form-group">
                                    <label>薪资年月 (可选):</label>
                                    <input type="text" id="salary-month" placeholder="例如: 2026-03">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>AI 模型:</label>
                                    <select id="ai-provider">
                                        <option value="deepseek">DeepSeek</option>
                                        <option value="claude">Claude (推荐)</option>
                                        <option value="openai">OpenAI GPT-4</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>生成模式:</label>
                                    <select id="mode">
                                        <option value="formula">公式模式</option>
                                        <option value="auto">自动选择</option>
                                        <option value="modular">模块化模式</option>
                                        <option value="direct">直接导入</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label>标准工时 (可选):</label>
                                    <input type="number" id="standard-hours" placeholder="例如: 174" step="0.1">
                                </div>
                                <div class="form-group" style="display:flex;align-items:center;gap:8px;margin-top:22px;">
                                    <input type="checkbox" id="multi-sheet-source" style="width:auto;">
                                    <label for="multi-sheet-source" style="margin:0;cursor:pointer;" title="启用后读取数据源所有Sheet，按Sheet名称和表头结构优先匹配">数据源多Sheet读取</label>
                                </div>
                            </div>
                            <div class="form-row form-row-full">
                                <div class="form-group">
                                    <label>手动表头 (可选，复杂表头时使用):</label>
                                    <textarea id="manual-headers" rows="2" placeholder='{"文件名.xlsx": {"Sheet1": [3, 3]}}  — 指定表头所在行号'></textarea>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 隐藏的上传代码 input -->
    <input type="file" id="upload-code-input" accept=".py" style="display:none;" onchange="handleUploadCode(event)">

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/training.js?v=20260413a"></script>
</body>
</html>
