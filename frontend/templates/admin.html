<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理 - 数据整合平台</title>
    <link rel="stylesheet" href="/static/css/admin.css?v=20260521b">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <nav class="nav-links">
                    <a href="/dashboard">首页</a>
                    <a href="/rules">规则</a>
                    <a href="/training">智训</a>
                    <a href="/compute">智算</a>
                    <a href="/tools">智能小工具</a>
                    <a href="/admin" class="active">管理</a>
                </nav>
            </div>
            <div class="user-info" id="user-info"></div>
        </header>

        <!-- Tab 导航 -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="users">用户管理</button>
            <button class="tab-btn" data-tab="roles">角色管理</button>
            <button class="tab-btn" data-tab="orgs">组织管理</button>
            <button class="tab-btn" data-tab="tenant-auth">租户授权</button>
            <button class="tab-btn" data-tab="ref-data">基础数据</button>
            <button class="tab-btn" data-tab="scripts">脚本管理</button>
        </div>

        <!-- 用户管理 Tab -->
        <div class="tab-content active" id="tab-users">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="Admin.showCreateUser()">新建用户</button>
            </div>
            <table class="data-table" id="users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>显示名</th>
                        <th>组织</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 角色管理 Tab -->
        <div class="tab-content" id="tab-roles">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="Admin.showCreateRole()">新建角色</button>
            </div>
            <table class="data-table" id="roles-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>角色名</th>
                        <th>描述</th>
                        <th>权限</th>
                        <th>系统角色</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 组织管理 Tab -->
        <div class="tab-content" id="tab-orgs">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="Admin.showCreateOrg()">新建组织</button>
            </div>
            <table class="data-table" id="orgs-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>组织名称</th>
                        <th>上级组织</th>
                        <th>描述</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 租户授权 Tab -->
        <div class="tab-content" id="tab-tenant-auth">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="Admin.showGrantAuth()">新增授权</button>
            </div>
            <table class="data-table" id="auth-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>租户ID</th>
                        <th>组织</th>
                        <th>授权类型</th>
                        <th>授权时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 基础数据管理 Tab -->
        <div class="tab-content" id="tab-ref-data">
            <div class="toolbar">
                <select id="ref-category-filter" onchange="Admin.loadRefData()">
                    <option value="">全部分类</option>
                </select>
                <select id="ref-scope-filter" onchange="Admin.loadRefData()">
                    <option value="">全局+租户</option>
                    <option value="global">仅全局</option>
                    <option value="tenant">仅租户级</option>
                </select>
                <button class="btn btn-primary" onclick="Admin.showUploadRefData()">上传基础数据</button>
            </div>
            <table class="data-table" id="ref-data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>分类</th>
                        <th>作用域</th>
                        <th>文件名</th>
                        <th>版本</th>
                        <th>生效日期</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 脚本管理 Tab -->
        <div class="tab-content" id="tab-scripts">
            <div class="toolbar">
                <input type="text" id="scripts-tenant-filter" placeholder="租户ID包含（模糊）" style="padding:6px 10px; min-width:200px;">
                <label style="display:inline-flex; align-items:center; gap:4px;">
                    <input type="checkbox" id="scripts-include-inactive"> 显示已停用
                </label>
                <button class="btn btn-primary" onclick="Admin.loadScripts()">查询</button>
            </div>
            <table class="data-table" id="scripts-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>租户ID</th>
                        <th>脚本名称</th>
                        <th>模式</th>
                        <th>版本</th>
                        <th>准确率</th>
                        <th>状态</th>
                        <th>来源会话</th>
                        <th>更新时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- 全局加载遮罩 -->
    <div class="loading-overlay" id="loading-overlay" style="display:none;">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">报表生成中，请稍候...</div>
    </div>

    <!-- 通用弹窗 -->
    <div class="modal-overlay" id="modal-overlay" style="display:none;">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modal-title">弹窗</h3>
                <button class="modal-close" onclick="Admin.closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn" onclick="Admin.closeModal()">取消</button>
                <button class="btn btn-primary" id="modal-confirm" onclick="Admin.confirmModal()">确定</button>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js?v=20260414t3"></script>
    <script src="/static/js/admin.js?v=20260521g"></script>
</body>
</html>
