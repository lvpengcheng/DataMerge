<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统管理 - 数据整合平台</title>
    <link rel="stylesheet" href="/static/css/admin.css?v=20260323t">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <nav class="nav-links">
                    <a href="/dashboard">首页</a>
                    <a href="/rules">规则</a>
                    <a href="/training">智训</a>
                    <a href="/compute">智算</a>
                    <a href="/admin" class="active">管理</a>
                </nav>
            </div>
            <div class="user-info" id="user-info"></div>
        </header>

        <!-- Tab 导航 -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="users">用户管理</button>
            <button class="tab-btn" data-tab="roles">角色管理</button>
            <button class="tab-btn" data-tab="orgs">组织管理</button>
            <button class="tab-btn" data-tab="tenant-auth">租户授权</button>
            <button class="tab-btn" data-tab="ref-data">基础数据</button>
            <button class="tab-btn" data-tab="templates">模版管理</button>
            <button class="tab-btn" data-tab="training-history">训练历史</button>
            <button class="tab-btn" data-tab="compute-history">计算历史</button>
        </div>

        <!-- 用户管理 Tab -->
        <div class="tab-content active" id="tab-users">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="Admin.showCreateUser()">新建用户</button>
            </div>
            <table class="data-table" id="users-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>显示名</th>
                        <th>组织</th>
                        <th>角色</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 角色管理 Tab -->
        <div class="tab-content" id="tab-roles">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="Admin.showCreateRole()">新建角色</button>
            </div>
            <table class="data-table" id="roles-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>角色名</th>
                        <th>描述</th>
                        <th>权限</th>
                        <th>系统角色</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 组织管理 Tab -->
        <div class="tab-content" id="tab-orgs">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="Admin.showCreateOrg()">新建组织</button>
            </div>
            <table class="data-table" id="orgs-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>组织名称</th>
                        <th>上级组织</th>
                        <th>描述</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 租户授权 Tab -->
        <div class="tab-content" id="tab-tenant-auth">
            <div class="toolbar">
                <button class="btn btn-primary" onclick="Admin.showGrantAuth()">新增授权</button>
            </div>
            <table class="data-table" id="auth-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>租户ID</th>
                        <th>组织</th>
                        <th>授权类型</th>
                        <th>授权时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 基础数据管理 Tab -->
        <div class="tab-content" id="tab-ref-data">
            <div class="toolbar">
                <select id="ref-category-filter" onchange="Admin.loadRefData()">
                    <option value="">全部分类</option>
                </select>
                <select id="ref-scope-filter" onchange="Admin.loadRefData()">
                    <option value="">全局+租户</option>
                    <option value="global">仅全局</option>
                    <option value="tenant">仅租户级</option>
                </select>
                <button class="btn btn-primary" onclick="Admin.showUploadRefData()">上传基础数据</button>
            </div>
            <table class="data-table" id="ref-data-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>名称</th>
                        <th>分类</th>
                        <th>作用域</th>
                        <th>文件名</th>
                        <th>版本</th>
                        <th>生效日期</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 模版管理 Tab -->
        <div class="tab-content" id="tab-templates">
            <div class="toolbar">
                <select id="tpl-tenant-filter" onchange="Admin.loadTemplates()">
                    <option value="">全部</option>
                    <option value="__global__">仅全局</option>
                </select>
                <button class="btn btn-primary" onclick="Admin.showCreateTemplate()">新建模版</button>
            </div>
            <table class="data-table" id="templates-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>模版名称</th>
                        <th>租户</th>
                        <th>模版文件</th>
                        <th>文件名规则</th>
                        <th>加密规则</th>
                        <th>报表模式</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 训练历史 Tab -->
        <div class="tab-content" id="tab-training-history">
            <div class="toolbar">
                <input type="text" id="training-tenant-filter" placeholder="租户ID筛选" style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;">
                <button class="btn" onclick="Admin.loadTrainingHistory()">查询</button>
            </div>
            <table class="data-table" id="training-history-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>租户</th>
                        <th>模式</th>
                        <th>状态</th>
                        <th>迭代次数</th>
                        <th>最佳准确率</th>
                        <th>开始时间</th>
                        <th>完成时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- 计算历史 Tab -->
        <div class="tab-content" id="tab-compute-history">
            <div class="toolbar">
                <input type="text" id="compute-tenant-filter" placeholder="租户ID筛选" style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;">
                <select id="compute-status-filter" style="padding:6px 12px;border:1px solid #ddd;border-radius:6px;">
                    <option value="">全部状态</option>
                    <option value="computing">计算中</option>
                    <option value="completed">已完成</option>
                    <option value="failed">失败</option>
                </select>
                <button class="btn" onclick="Admin.loadComputeHistory()">查询</button>
            </div>
            <table class="data-table" id="compute-history-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>租户</th>
                        <th>薪资周期</th>
                        <th>脚本ID</th>
                        <th>状态</th>
                        <th>输入文件数</th>
                        <th>耗时(秒)</th>
                        <th>创建时间</th>
                        <th>完成时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <!-- 全局加载遮罩 -->
    <div class="loading-overlay" id="loading-overlay" style="display:none;">
        <div class="spinner"></div>
        <div class="loading-text" id="loading-text">报表生成中，请稍候...</div>
    </div>

    <!-- 通用弹窗 -->
    <div class="modal-overlay" id="modal-overlay" style="display:none;">
        <div class="modal" id="modal">
            <div class="modal-header">
                <h3 id="modal-title">弹窗</h3>
                <button class="modal-close" onclick="Admin.closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
            <div class="modal-footer">
                <button class="btn" onclick="Admin.closeModal()">取消</button>
                <button class="btn btn-primary" id="modal-confirm" onclick="Admin.confirmModal()">确定</button>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js?v=20260323t3"></script>
    <script src="/static/js/admin.js?v=20260324e"></script>
</body>
</html>
