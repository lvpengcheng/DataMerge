<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录 - 数据整合平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/login.css" />
</head>
<body>
  <div class="container">
    <!-- 左侧：动画小人区域 -->
    <div class="left-panel">
      <div class="floating-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
        <div class="shape shape-5"></div>
      </div>

      <div class="characters-scene">
        <div class="character char-1" id="char1">
          <svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="60" cy="120" rx="28" ry="32" fill="#5B9CF5" />
            <circle cx="60" cy="58" r="30" fill="#FFE0B2" />
            <circle cx="42" cy="65" r="6" fill="#FFAB91" opacity="0.6" />
            <circle cx="78" cy="65" r="6" fill="#FFAB91" opacity="0.6" />
            <circle cx="50" cy="55" r="4" fill="#333" />
            <circle cx="70" cy="55" r="4" fill="#333" />
            <circle cx="51.5" cy="53.5" r="1.5" fill="#fff" />
            <circle cx="71.5" cy="53.5" r="1.5" fill="#fff" />
            <path d="M52 70 Q60 78 68 70" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round" />
            <g class="waving-hand">
              <ellipse cx="98" cy="85" rx="8" ry="6" fill="#FFE0B2" />
              <line x1="90" y1="88" x2="78" y2="100" stroke="#FFE0B2" stroke-width="8" stroke-linecap="round" />
            </g>
            <ellipse cx="32" cy="110" rx="7" ry="5" fill="#FFE0B2" />
            <ellipse cx="48" cy="148" rx="10" ry="5" fill="#3A7BD5" />
            <ellipse cx="72" cy="148" rx="10" ry="5" fill="#3A7BD5" />
            <path d="M30 50 Q35 20 60 25 Q85 20 90 50" fill="#8D6E63" />
            <circle cx="38" cy="40" r="5" fill="#8D6E63" />
            <circle cx="82" cy="40" r="5" fill="#8D6E63" />
          </svg>
        </div>
        <div class="character char-2" id="char2">
          <svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="60" cy="120" rx="26" ry="30" fill="#3D8BF8" />
            <circle cx="60" cy="58" r="28" fill="#FFE0B2" />
            <circle cx="44" cy="64" r="5" fill="#FFAB91" opacity="0.6" />
            <circle cx="76" cy="64" r="5" fill="#FFAB91" opacity="0.6" />
            <path d="M46 56 Q50 50 54 56" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round" />
            <path d="M66 56 Q70 50 74 56" stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round" />
            <path d="M48 68 Q60 80 72 68" stroke="#333" stroke-width="2" fill="#FF8A80" stroke-linecap="round" />
            <line x1="34" y1="100" x2="20" y2="78" stroke="#FFE0B2" stroke-width="8" stroke-linecap="round" />
            <line x1="86" y1="100" x2="100" y2="78" stroke="#FFE0B2" stroke-width="8" stroke-linecap="round" />
            <ellipse cx="18" cy="74" rx="6" ry="5" fill="#FFE0B2" />
            <ellipse cx="102" cy="74" rx="6" ry="5" fill="#FFE0B2" />
            <ellipse cx="48" cy="148" rx="9" ry="5" fill="#2E6FD1" />
            <ellipse cx="72" cy="148" rx="9" ry="5" fill="#2E6FD1" />
            <ellipse cx="60" cy="34" rx="30" ry="6" fill="#7EB8FF" />
            <path d="M40 34 Q42 10 60 8 Q78 10 80 34" fill="#7EB8FF" />
            <circle cx="60" cy="6" r="5" fill="#3A7BD5" />
          </svg>
        </div>
        <div class="character char-3" id="char3">
          <svg viewBox="0 0 120 160" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="60" cy="120" rx="25" ry="28" fill="#56CCF2" />
            <circle cx="60" cy="58" r="26" fill="#FFE0B2" />
            <circle cx="43" cy="64" r="7" fill="#FF8A80" opacity="0.5" />
            <circle cx="77" cy="64" r="7" fill="#FF8A80" opacity="0.5" />
            <ellipse cx="50" cy="55" rx="5" ry="6" fill="#333" />
            <ellipse cx="70" cy="55" rx="5" ry="6" fill="#333" />
            <circle cx="52" cy="53" r="2" fill="#fff" />
            <circle cx="72" cy="53" r="2" fill="#fff" />
            <circle cx="60" cy="71" r="3" fill="#FF8A80" />
            <ellipse cx="60" cy="112" rx="10" ry="6" fill="#FFE0B2" />
            <ellipse cx="48" cy="145" rx="9" ry="5" fill="#3A9BE0" />
            <ellipse cx="72" cy="145" rx="9" ry="5" fill="#3A9BE0" />
            <path d="M48 36 L60 42 L72 36 L60 30 Z" fill="#5B9CF5" />
            <circle cx="60" cy="36" r="4" fill="#3A7BD5" />
            <path d="M34 55 Q30 30 50 28" stroke="#5D4037" stroke-width="5" fill="none" stroke-linecap="round" />
            <path d="M86 55 Q90 30 70 28" stroke="#5D4037" stroke-width="5" fill="none" stroke-linecap="round" />
          </svg>
        </div>
        <div class="character char-4" id="char4">
          <svg viewBox="0 0 130 160" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="65" cy="115" rx="24" ry="28" fill="#6CB4EE" />
            <circle cx="65" cy="55" r="27" fill="#FFE0B2" />
            <circle cx="48" cy="62" r="5" fill="#FFAB91" opacity="0.5" />
            <circle cx="82" cy="62" r="5" fill="#FFAB91" opacity="0.5" />
            <circle cx="55" cy="52" r="4" fill="#333" />
            <circle cx="75" cy="52" r="4" fill="#333" />
            <circle cx="56.5" cy="50.5" r="1.5" fill="#fff" />
            <circle cx="76.5" cy="50.5" r="1.5" fill="#fff" />
            <path d="M57 66 Q65 76 73 66" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round" />
            <ellipse cx="65" cy="72" rx="4" ry="3" fill="#FF8A80" />
            <line x1="41" y1="100" x2="25" y2="90" stroke="#FFE0B2" stroke-width="7" stroke-linecap="round" class="run-arm-left" />
            <line x1="89" y1="100" x2="105" y2="115" stroke="#FFE0B2" stroke-width="7" stroke-linecap="round" class="run-arm-right" />
            <ellipse cx="45" cy="143" rx="10" ry="5" fill="#4A94D8" class="run-foot-left" />
            <ellipse cx="80" cy="140" rx="10" ry="5" fill="#4A94D8" class="run-foot-right" />
            <path d="M42 75 Q65 82 88 75 Q90 85 85 90" stroke="#7EB8FF" stroke-width="4" fill="none" stroke-linecap="round" />
            <line x1="85" y1="85" x2="95" y2="105" stroke="#7EB8FF" stroke-width="4" stroke-linecap="round" class="scarf-tail" />
          </svg>
        </div>
      </div>

      <div class="ground"><div class="grass"></div></div>

      <div class="decorations">
        <div class="star star-1">&#10022;</div>
        <div class="star star-2">&#9733;</div>
        <div class="star star-3">&#10023;</div>
        <div class="star star-4">&#10022;</div>
        <div class="star star-5">&#9825;</div>
        <div class="star star-6">&#10022;</div>
        <div class="cloud cloud-1">&#9729;</div>
        <div class="cloud cloud-2">&#9729;</div>
      </div>

      <h2 class="welcome-text">数据整合平台</h2>
    </div>

    <!-- 右侧：登录表单区域 -->
    <div class="right-panel">
      <div class="login-card">
        <div class="login-header">
          <div class="avatar-icon">
            <svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
              <circle cx="30" cy="30" r="28" fill="url(#avatarGrad)" />
              <circle cx="30" cy="24" r="10" fill="#fff" />
              <path d="M14 48 Q14 36 30 36 Q46 36 46 48" fill="#fff" />
              <defs>
                <linearGradient id="avatarGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#5B9CF5" />
                  <stop offset="100%" stop-color="#56CCF2" />
                </linearGradient>
              </defs>
            </svg>
          </div>
          <h1>用户登录</h1>
          <p class="subtitle">请输入您的账号信息</p>
        </div>

        <form id="loginForm">
          <div class="input-group" id="usernameGroup">
            <label for="username">用户名</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                  <circle cx="12" cy="7" r="4" />
                </svg>
              </span>
              <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" required autofocus />
            </div>
          </div>

          <div class="input-group" id="passwordGroup">
            <label for="password">密码</label>
            <div class="input-wrapper">
              <span class="input-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
              </span>
              <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password" required />
              <button type="button" class="toggle-password" id="togglePassword">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="eyeIcon">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div id="error-msg" class="error-msg" style="display:none;"></div>

          <button type="submit" class="login-btn" id="loginBtn">
            <span class="btn-text">登 录</span>
            <span class="btn-loader" id="btnLoader"></span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script src="/static/js/login.js"></script>
</body>
</html>
