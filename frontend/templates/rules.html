<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DataMerge - 规则整理</title>
    <link rel="stylesheet" href="/static/css/rules.css?v=20260324d">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <nav class="nav-links">
                    <a href="/dashboard">首页</a>
                    <a href="/rules" class="active">规则</a>
                    <a href="/training">智训</a>
                    <a href="/compute">智算</a>
                    <a href="/admin" id="nav-admin" style="display:none;">管理</a>
                </nav>
            </div>
            <div class="user-info" id="user-info"></div>
        </header>

        <div class="main-content">
            <!-- 左侧: 会话列表 -->
            <section class="session-sidebar">
                <div class="sidebar-header">
                    <h2>会话历史</h2>
                    <button class="btn-new-session" onclick="createNewSession()">+ 新建</button>
                </div>
                <div class="session-list" id="session-list">
                    <div class="session-list-empty" id="session-list-empty">暂无历史会话</div>
                </div>
            </section>

            <!-- 右侧: AI 对话区 -->
            <div class="chat-panel">
                <div class="chat-header">
                    <h2 id="chat-title">AI 对话</h2>
                    <div class="chat-actions">
                        <button id="download-btn" class="btn btn-download" onclick="downloadRules()" style="display:none;">下载 rules.md</button>
                        <button class="btn btn-clear" onclick="clearChat()">清空</button>
                    </div>
                </div>

                <div class="chat-messages" id="chat-messages">
                    <div class="chat-placeholder" id="chat-placeholder">
                        <p>点击下方 📎 上传文件，输入需求后发送</p>
                    </div>
                </div>

                <div class="chat-input-area">
                    <button class="btn-attach" id="attach-btn" onclick="toggleAttachPopover()" title="文件与配置">📎</button>
                    <textarea id="chat-input" placeholder="输入整理要求或追问..." rows="2" onkeydown="handleInputKeydown(event)"></textarea>
                    <button id="send-btn" class="btn btn-send" onclick="sendMessage()">发送</button>
                </div>

                <!-- 附件弹窗 -->
                <div class="attach-popover" id="attach-popover" style="display:none;">
                    <div class="popover-header">
                        <span>文件与配置</span>
                        <button class="popover-close" onclick="toggleAttachPopover()">&times;</button>
                    </div>
                    <div class="popover-body">
                        <div class="form-group">
                            <label>源文件:</label>
                            <input type="file" id="source-files" multiple accept=".xlsx,.xls">
                            <div class="file-list" id="source-file-list"></div>
                        </div>
                        <div class="form-group">
                            <label>目标文件:</label>
                            <input type="file" id="target-file" accept=".xlsx,.xls">
                            <div class="file-list" id="target-file-list"></div>
                        </div>
                        <div class="form-group">
                            <label>设计文档 (可选):</label>
                            <input type="file" id="design-docs" multiple accept=".pdf,.docx,.doc,.txt,.md,.xlsx,.xls">
                            <div class="file-list" id="design-doc-list"></div>
                        </div>
                        <div class="form-group">
                            <label>AI 模型:</label>
                            <select id="ai-provider">
                                <option value="deepseek">DeepSeek</option>
                                <option value="claude">Claude (推荐)</option>
                                <option value="openai">OpenAI GPT-4</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/js/auth.js"></script>
    <script src="/static/js/rules.js?v=20260324d"></script>
</body>
</html>
