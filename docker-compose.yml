version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./tenants:/app/tenants
      - ./data:/app/data
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  celery-worker:
    build: .
    command: celery -A backend.app.celery_app worker --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./tenants:/app/tenants
      - ./data:/app/data
    depends_on:
      - backend
      - redis
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A backend.app.celery_app beat --loglevel=info
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///./data.db
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./tenants:/app/tenants
      - ./data:/app/data
    depends_on:
      - backend
      - redis
    restart: unless-stopped

volumes:
  redis_data: